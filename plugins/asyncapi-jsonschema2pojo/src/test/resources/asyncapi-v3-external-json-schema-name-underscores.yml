asyncapi: 3.1.0
info:
  title: ZenWave repro
  version: 1.0.0

channels:
  sampleChannel:
    address: sample.topic
    messages:
      SampleMessage:
        $ref: '#/components/messages/SampleMessage'

operations:
  publishSample:
    action: send
    channel:
      $ref: '#/channels/sampleChannel'
    messages:
      - $ref: '#/components/messages/SampleMessage'

components:
  messages:
    SampleMessage:
      name: SampleMessage
      payload:
        schemaFormat: application/schema+json;version=draft-2020-12
        schema:
          $ref: './sample-message.json'
