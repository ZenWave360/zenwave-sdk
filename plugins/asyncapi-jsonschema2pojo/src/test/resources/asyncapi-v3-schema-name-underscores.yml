asyncapi: 3.1.0
info:
  title: ZenWave repro
  version: 1.0.0

channels:
  sampleChannel:
    address: sample.topic

operations:
  publishSample:
    action: send
    channel:
      $ref: '#/channels/sampleChannel'
    messages:
      - $ref: '#/components/messages/SampleMessage'

components:
  messages:
    SampleMessage:
      name: SampleMessage
      payload:
        schema:
          $ref: '#/components/schemas/SamplePayload'

  schemas:
    SamplePayload:
      type: object
      additionalProperties: false
      properties:
        address:
          $ref: '#/components/schemas/Address_c'
      required:
        - address
    Address_c:
      type: object
      additionalProperties: false
      properties:
        city:
          type: string
      required:
        - city
