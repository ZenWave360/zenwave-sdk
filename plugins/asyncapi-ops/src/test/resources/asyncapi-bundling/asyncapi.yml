asyncapi: 3.0.0
info:
  title: "Bundled Avro Example"
  version: 0.0.1

channels:
  shopping-cart-item-added:
    address: "shopping.cart.item-added"
    messages:
      ShoppingCartItemAdded:
        $ref: '#/components/messages/ShoppingCartItemAdded'

operations:
  onShoppingCartItemAdded:
    action: send
    channel:
      $ref: '#/channels/shopping-cart-item-added'
    bindings:
      kafka:
        x-principal: "shopping.cart"

components:
  messages:
    ShoppingCartItemAdded:
      name: ShoppingCartItemAdded
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "./avro/ShoppingCartItemAdded.avsc"
