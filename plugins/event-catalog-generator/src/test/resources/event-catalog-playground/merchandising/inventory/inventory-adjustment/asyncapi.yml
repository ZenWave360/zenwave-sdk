asyncapi: 3.0.0
id: url:merchandising.inventory.inventory-adjustment
info:
  title: Inventory Adjustment Service
  version: 1.0.0
  description: ARTS Service Domain - Processes inventory adjustments and updates with synchronous command-response pattern

x-application-bindings:
  kafka:
    x-principal: "merchandising.inventory.inventory-adjustment"
    x-clientId: "merchandising.inventory.inventory-adjustment"
    x-groupId: "merchandising.inventory.inventory-adjustment"

channels:
  adjust-inventory:
    address: merchandising.inventory.inventory-adjustment.adjust-inventory.command.avro.scope_global.v0
    summary: Adjust Inventory Command
    description: This channel is used to request inventory adjustments for products at specific locations.
    messages:
      AdjustInventoryCommand:
        payload:
          schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
          schema:
            $ref: './avro/AdjustInventoryCommand.avsc'
    bindings:
      kafka:
        partitions: 20
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["delete", "compact"]
          retention.ms: 604800000
          retention.bytes: 1000000000
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-kafka-schema-registry:
          schemaLookupStrategy: "TopicNameStrategy"
          compatibility: "BACKWARD"
          type: "AVRO"
          normalize: true

  adjust-inventory-response:
    address: merchandising.inventory.inventory-adjustment.adjust-inventory.response.avro.canonical.scope_global.v0
    summary: Adjust Inventory Response
    description: This channel is used to send the response of an inventory adjustment operation.
    messages:
      AdjustInventoryResponse:
        payload:
          schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
          schema:
            $ref: './avro/AdjustInventoryResponse.avsc'
    bindings:
      kafka:
        partitions: 20
        replicas: 3
        topicConfiguration:
          cleanup.policy: ["delete", "compact"]
          retention.ms: 604800000
          retention.bytes: 1000000000
          delete.retention.ms: 86400000
          max.message.bytes: 1048588
        x-kafka-schema-registry:
          schemaLookupStrategy: "TopicNameStrategy"
          compatibility: "FORWARD"
          type: "AVRO"
          normalize: true

operations:
  doAdjustInventory:
    action: receive
    channel:
      $ref: '#/channels/adjust-inventory'
    reply:
      channel:
        $ref: '#/channels/adjust-inventory-response'
    bindings:
      x-retry-dlq:
        address: ${consumer_group}.${original_topic}.${suffix}
        maxRetries: 3

  onAdjustInventoryResponse:
    action: send
    channel:
      $ref: '#/channels/adjust-inventory-response'

