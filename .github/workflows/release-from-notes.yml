name: Release from Notes

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version, for example 2.5.3"
        required: true
      developmentVersion:
        description: "Next snapshot version, for example 2.5.4-SNAPSHOT"
        required: true
      targetBranch:
        description: "Branch to release from"
        required: true
        default: "main"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.inputs.releaseVersion }}
  cancel-in-progress: false

jobs:
  release:
    name: Prepare, publish to Sonatype, and create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.targetBranch }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_VERSION="${{ github.event.inputs.releaseVersion }}"
          DEVELOPMENT_VERSION="${{ github.event.inputs.developmentVersion }}"
          RELEASE_NOTES="release-notes/release-notes.v${RELEASE_VERSION}.md"

          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "releaseVersion must look like 2.5.3"
            exit 1
          fi

          if [[ ! "${DEVELOPMENT_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+-SNAPSHOT$ ]]; then
            echo "developmentVersion must look like 2.5.4-SNAPSHOT"
            exit 1
          fi

          if [[ ! -f "${RELEASE_NOTES}" ]]; then
            echo "Missing release notes: ${RELEASE_NOTES}"
            exit 1
          fi

          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists locally"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists on origin"
            exit 1
          fi

          {
            echo "release_notes=${RELEASE_NOTES}"
            echo "tag_name=v${RELEASE_VERSION}"
          } >> "${GITHUB_OUTPUT}"
        id: validate

      - name: Configure Git user
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"

      - name: Prepare Maven release
        run: |
          mvn -B release:prepare \
            -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }} \
            -DpushChanges=false
          mvn -B release:clean
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create Pull Request into target branch
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Release ${{ github.event.inputs.releaseVersion }}"
          branch: release/${{ github.event.inputs.releaseVersion }}
          base: ${{ github.event.inputs.targetBranch }}
          title: "Release ${{ github.event.inputs.releaseVersion }}"
          body: "Release ${{ github.event.inputs.releaseVersion }}"
          labels: release
          delete-branch: true

      - name: Enable Pull Request Automerge
        run: gh pr merge --merge --auto --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Push release tag
        run: git push --tags

      - name: Check out release tag
        run: git checkout ${{ steps.validate.outputs.tag_name }}

      - name: Publish release deployment to Sonatype
        run: mvn --batch-mode deploy -DdeployAtEnd=true -Dmaven.javadoc.skip=false
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          SIGN_KEY: ${{ secrets.SIGN_KEY }}
          SIGN_KEY_PASS: ${{ secrets.SIGN_KEY_PASS }}

      - name: Create GitHub release from release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.validate.outputs.tag_name }}" \
            --title "${{ steps.validate.outputs.tag_name }}" \
            --notes-file "${{ steps.validate.outputs.release_notes }}"

      - name: Sync main back to develop
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_BRANCH="${{ github.event.inputs.targetBranch }}"
          DEVELOP_BRANCH="develop"
          RELEASE_PR="${{ steps.cpr.outputs.pull-request-number }}"

          echo "Waiting for release PR #${RELEASE_PR} to merge into ${RELEASE_BRANCH}..."
          while [[ "$(gh pr view "${RELEASE_PR}" --json state --jq '.state')" != "MERGED" ]]; do
            sleep 30
          done

          PR_NUMBER="$(gh pr list \
            --base "${DEVELOP_BRANCH}" \
            --head "${RELEASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -z "${PR_NUMBER}" ]]; then
            PR_URL="$(gh pr create \
              --base "${DEVELOP_BRANCH}" \
              --head "${RELEASE_BRANCH}" \
              --title "Sync ${RELEASE_BRANCH} back to ${DEVELOP_BRANCH} after ${{ steps.validate.outputs.tag_name }}" \
              --body "Syncs the release version bump and next snapshot version back to ${DEVELOP_BRANCH}.")"
            PR_NUMBER="${PR_URL##*/}"
          fi

          gh pr merge "${PR_NUMBER}" --merge --auto

      - name: Publish Maven snapshots on develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish-maven-snapshots.yml --ref develop
