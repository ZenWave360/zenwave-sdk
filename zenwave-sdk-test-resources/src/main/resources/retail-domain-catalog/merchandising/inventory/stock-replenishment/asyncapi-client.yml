asyncapi: 3.0.0
id: url:merchandising.inventory.stock-replenishment.client
info:
  title: Stock Replenishment Topic Client
  version: 1.0.0
  description: This specification defines the topics consumed or invoked by the stock replenishment service as a client.

channels:
  reserve-stock-command:
    $ref: '../inventory-adjustment/asyncapi.yml#/channels/reserve-stock-command'
  reserve-stock-response:
    $ref: '../inventory-adjustment/asyncapi.yml#/channels/reserve-stock-response'
  inventory-adjusted:
    $ref: '../inventory-adjustment/asyncapi.yml#/channels/inventory-adjusted'
  price-changed:
    $ref: '../../pricing/price-change/asyncapi.yml#/channels/price-changed'

operations:
  doReserveStock:
    action: send
    channel:
      $ref: '#/channels/reserve-stock-command'
    bindings:
      kafka:
        x-principal: "merchandising.inventory.stock-replenishment"

  onReserveStockResponse:
    action: receive
    channel:
      $ref: '#/channels/reserve-stock-response'
    bindings:
      kafka:
        x-principal: "merchandising.inventory.stock-replenishment"
        x-groupId: "merchandising.inventory.stock-replenishment"
        x-error-topics:
          addressTemplate: "${groupId}.__.${channel.address}.${suffix}"
          retryTopics: 3
          retry:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/retry/silver'
          dlq:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/dlq/standard'

  onInventoryAdjustedEvent:
    action: receive
    channel:
      $ref: '#/channels/inventory-adjusted'
    bindings:
      kafka:
        x-principal: "merchandising.inventory.stock-replenishment.sys"
        x-groupId: "merchandising.inventory.stock-replenishment.sys"
        x-error-topics:
          addressTemplate: "${groupId}.__.${channel.address}.${suffix}"
          retryTopics: 3
          retry:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/retry/silver'
          dlq:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/dlq/standard'

  onPriceChangedEvent:
    action: receive
    channel:
      $ref: '#/channels/price-changed'
    bindings:
      kafka:
        x-principal: "merchandising.inventory.stock-replenishment.sys"
        x-groupId: "merchandising.inventory.stock-replenishment.sys"
        x-error-topics:
          addressTemplate: "${groupId}.__.${channel.address}.${suffix}"
          retryTopics: 3
          retry:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/retry/silver'
          dlq:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/dlq/standard'
