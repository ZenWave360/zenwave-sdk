asyncapi: 3.0.0
id: url:customer-relationship.customer-management.loyalty-management
info:
  title: Loyalty Management Topic Provider
  version: 1.0.0
  description: This specification defines the topics provided by the loyalty management service from the provider point of view.

servers:
  dev:
    host: kafka-dev.example.com
    protocol: kafka
  staging:
    host: kafka-staging.example.com
    protocol: kafka
  production:
    host: kafka-production.example.com
    protocol: kafka

channels:
  refresh-customer-tier-command:
    address: customer-relationship.customer-management.loyalty-management.refresh-customer-tier.command.avro.v0
    summary: Refresh Customer Tier Command
    description: This channel is used to request recalculation of the customer's loyalty tier.
    messages:
      RefreshCustomerTierCommand:
        payload:
          schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
          schema:
            $ref: './avro/RefreshCustomerTierCommand.avsc'
        traits:
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaKeyString'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaTopicRecordNameStrategy'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaBackwardCompatibility'
    bindings:
      $ref: '../../../master/kafka-bindings.yml#/components/channelBindings/kafkaGold'

  refresh-customer-tier-response:
    address: customer-relationship.customer-management.loyalty-management.refresh-customer-tier.response.avro.v0
    summary: Refresh Customer Tier Response
    description: This channel informs the result of a customer tier refresh request.
    messages:
      RefreshCustomerTierResponse:
        payload:
          schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
          schema:
            $ref: './avro/RefreshCustomerTierResponse.avsc'
        traits:
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaKeyString'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaTopicRecordNameStrategy'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaForwardCompatibility'
    bindings:
      $ref: '../../../master/kafka-bindings.yml#/components/channelBindings/kafkaGold'

  loyalty-tier-updated:
    address: customer-relationship.customer-management.loyalty-management.loyalty-tier-updated.event.avro.v0
    summary: Loyalty Tier Updated Event
    description: This channel informs that the loyalty tier for a customer was updated.
    messages:
      LoyaltyTierUpdatedEvent:
        payload:
          schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
          schema:
            $ref: './avro/LoyaltyTierUpdated.avsc'
        traits:
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaKeyString'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaTopicRecordNameStrategy'
          - $ref: '../../../master/kafka-bindings.yml#/components/messageTraits/kafkaForwardCompatibility'
    bindings:
      $ref: '../../../master/kafka-bindings.yml#/components/channelBindings/kafkaGold'

operations:
  doRefreshCustomerTierCommand:
    action: receive
    channel:
      $ref: '#/channels/refresh-customer-tier-command'
    bindings:
      kafka:
        x-principal: "customer-relationship.customer-management.loyalty-management"
        x-groupId: "customer-relationship.customer-management.loyalty-management"
        x-error-topics:
          addressTemplate: "${groupId}.__.${channel.address}.${suffix}"
          retryTopics: 3
          retry:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/retry/silver'
          dlq:
            $ref: '../../../master/kafka-bindings.yml#/components/x-error-topics/dlq/standard'

  onRefreshCustomerTierResponse:
    action: send
    channel:
      $ref: '#/channels/refresh-customer-tier-response'
    traits:
      - $ref: '#/components/operationTraits/kafkaPrincipal'
      - $ref: '#/components/operationTraits/kafkaClientId'

  onLoyaltyTierUpdatedEvent:
    action: send
    channel:
      $ref: '#/channels/loyalty-tier-updated'
    traits:
      - $ref: '#/components/operationTraits/kafkaPrincipal'
      - $ref: '#/components/operationTraits/kafkaClientId'

components:
  operationTraits:
    kafkaPrincipal:
      bindings:
        kafka:
          x-principal: "customer-relationship.customer-management.loyalty-management"
    kafkaClientId:
      bindings:
        kafka:
          clientId:
            type: "string"
            enum: ["customer-relationship.customer-management.loyalty-management"]
    kafkaConsumerGroup:
      bindings:
        kafka:
          groupId:
            type: "string"
            enum: ["customer-relationship.customer-management.loyalty-management"]
